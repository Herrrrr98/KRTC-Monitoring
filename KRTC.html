<!DOCTYPE html>
<html>
<header>
  <title>KRTC Monitoring</title>
  <style>
    body{ background-color: #00113986;}
    #header{ text-align: center; color: #ffffff;};
    #console{ text-align: left; color: #ffffff;}
    #command_line{text-align: left; color: #ffffff;}
    .groove{ border-style: solid; border-width: 3px; border-radius: 8px; text-align: left;}
  </style>
  <script>
        function getValue(){
            var cmd = document.getElementById('cmdline').value;
            document.getElementById('console_1').innerHTML=cmd;
        };
  </script>
</header>
<body>
<div id="header">
  <h1>KRTC Monitoring</h1>
  <p id="host_stats"></p>
</div>
<div id="console">
  <div class="groove">
    <li id="console_1">1</li>
  </div>
  <form name="console">
    <div id="command_line">
    <label for="cmdline">Input a Command:</label>
    <input type="text" id="cmdline" name="cmdline">
    <input type="button" value="Submit" onclick="getValue()">
    </div>
  </form>
</div>

</body>
</html>
